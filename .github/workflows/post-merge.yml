name: Post Merge

on:
  pull_request:
    types: [closed]

jobs:
  post-merge:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Assess merge mode (best effort)
        id: merge_assessment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const mergeSha = pr.merge_commit_sha;
            const headSha = pr.head.sha;
            const prNumber = pr.number;

            let message = "unknown";
            let parentCount = -1;
            let likelySquash = false;

            if (mergeSha) {
              const commit = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: mergeSha
              });

              parentCount = commit.data.parents.length;
              const commitMessage = commit.data.commit.message || "";

              if (parentCount > 1) {
                message = "merge-commit-detected (unexpected for linear history)";
              } else if (commitMessage.includes(`(#${prNumber})`) || mergeSha !== headSha) {
                likelySquash = true;
                message = "likely-squash (best effort)";
              } else {
                message = "linear-single-parent (could be rebase/squash)";
              }
            }

            core.setOutput("summary", message);
            core.setOutput("parent_count", String(parentCount));
            core.setOutput("likely_squash", String(likelySquash));

      - name: Quick post-merge consistency checks
        run: |
          node scripts/validate-structure.mjs
          node scripts/validate-templates.mjs

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "Merged ✅"
            });

      - name: Check if head branch was deleted (best effort)
        id: branch_cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;

            try {
              await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch
              });

              core.warning(`Head branch still exists: ${branch}`);
              core.setOutput("deleted", "false");
            } catch (error) {
              if (error.status === 404) {
                core.info(`Head branch already deleted: ${branch}`);
                core.setOutput("deleted", "true");
              } else {
                throw error;
              }
            }

      - name: Write post-merge summary
        run: |
          echo "## Post-merge report" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: #${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merge assessment: ${{ steps.merge_assessment.outputs.summary }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merge commit parent count: ${{ steps.merge_assessment.outputs.parent_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Head branch deleted: ${{ steps.branch_cleanup.outputs.deleted }}" >> "$GITHUB_STEP_SUMMARY"
